<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Gradiente dourado -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4E4BC;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#C5A028;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B7355;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F9E076;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8941F;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Círculo de fundo opcional -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="url(#goldGradient)" stroke-width="1" opacity="0.3"/>
  
  <!-- Pomba - corpo -->
  <ellipse cx="50" cy="52" rx="12" ry="18" fill="url(#goldGradient)"/>
  
  <!-- Cabeça -->
  <circle cx="50" cy="38" r="8" fill="url(#goldGradient)"/>
  
  <!-- Bico -->
  <path d="M50 36 L54 38 L50 40 Z" fill="#B8941F"/>
  
  <!-- Olho -->
  <circle cx="52" cy="37" r="1.5" fill="#5C4A1F"/>
  
  <!-- Asa esquerda -->
  <path d="M38 48 Q25 40 20 50 Q22 58 35 55 Q40 52 38 48" fill="url(#wingGradient)" stroke="#B8941F" stroke-width="0.5"/>
  <path d="M36 52 Q28 55 25 60 Q30 62 38 58" fill="url(#wingGradient)" opacity="0.8"/>
  
  <!-- Asa direita -->
  <path d="M62 48 Q75 40 80 50 Q78 58 65 55 Q60 52 62 48" fill="url(#wingGradient)" stroke="#B8941F" stroke-width="0.5"/>
  <path d="M64 52 Q72 55 75 60 Q70 62 62 58" fill="url(#wingGradient)" opacity="0.8"/>
  
  <!-- Cauda -->
  <path d="M45 68 Q50 75 55 68 L52 72 L48 72 Z" fill="url(#goldGradient)"/>
  
  <!-- Ramo de oliveira no bico -->
  <path d="M54 38 Q60 35 65 38" stroke="#7A9B5A" stroke-width="1.5" fill="none"/>
  <!-- Folhas do oliveira -->
  <ellipse cx="58" cy="36" rx="3" ry="1.5" fill="#8FBC8F" transform="rotate(-20 58 36)"/>
  <ellipse cx="62" cy="37" rx="3" ry="1.5" fill="#8FBC8F" transform="rotate(10 62 37)"/>
  <ellipse cx="60" cy="34" rx="2.5" ry="1.2" fill="#9ACD9A" transform="rotate(-10 60 34)"/>
  
  <!-- Brilho decorativo -->
  <circle cx="46" cy="35" r="2" fill="#FFF8DC" opacity="0.6"/>
</svg>